name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@gitmesh.dev"
          git config --global init.defaultBranch main

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npx vitest run --testTimeout=60000
        env:
          GIT_EDITOR: 'true'
          GIT_SEQUENCE_EDITOR: 'true'
          EDITOR: 'true'

  verify-package:
    name: Verify package integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify dist entry point exists
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

      - name: Verify package can be required
        run: node -e "const m = require('./dist/index'); console.log('exports:', Object.keys(m).slice(0,10).join(', '))"

      - name: Verify no extraneous files in package
        run: |
          npm pack --dry-run 2>&1 | tee pack-output.txt
          grep -q 'index.js' pack-output.txt
          grep -q 'index.d.ts' pack-output.txt

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, verify-package]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          # 不设 registry-url — 避免 setup-node 注入 NODE_AUTH_TOKEN 覆盖 OIDC

      - run: npm ci

      - run: npm run build

      - name: Publish
        run: npm publish --provenance --registry https://registry.npmjs.org
