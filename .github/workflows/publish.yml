name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm tag (latest | next | beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@gitmesh.dev"
          git config --global init.defaultBranch main

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        id: test
        run: |
          npx vitest run --reporter=verbose > test-output.txt 2>&1
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        env:
          GIT_EDITOR: 'true'
          GIT_SEQUENCE_EDITOR: 'true'
          EDITOR: 'true'

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.txt

      - name: Fail if tests failed
        if: steps.test.outputs.EXIT_CODE != '0'
        run: |
          cat test-output.txt
          exit 1

      - name: Publish
        run: npm publish --tag ${{ inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
