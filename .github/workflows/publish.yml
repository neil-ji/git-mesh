name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm tag (latest | next | beta)'
        required: false
        default: 'latest'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Configure git
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@gitmesh.dev"
          git config --global init.defaultBranch main

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run --testTimeout=60000
        env:
          GIT_EDITOR: 'true'
          GIT_SEQUENCE_EDITOR: 'true'
          EDITOR: 'true'

      - name: Publish
        run: npm publish --tag ${{ inputs.tag || 'latest' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
