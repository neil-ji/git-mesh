<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1424"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Logo hex -->
  <g transform="translate(340, 140) scale(8)">
    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="12" y="9.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="4.2" font-weight="700" fill="#06b6d4" letter-spacing="0.04em">git</text>
    <text x="12" y="15.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="4.2" font-weight="700" fill="#06b6d4" letter-spacing="0.04em">mesh</text>
  </g>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#ffffff">gitmesh</text>
  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.7)">Git Orchestration for AI Agents</text>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.4)">Isolated worktrees · Auto merge · Smart conflict routing</text>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#06b6d4" opacity="0.8"/>
  <text x="600" y="610" text-anchor="middle" font-family="monospace" font-size="14" fill="#0a1424" font-weight="600">npm install gitmesh</text>
</svg>
